name: Run Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run smoke tests and generate report
        run: pytest -m smoke --html=report.html --self-contained-html

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: report.html

      - name: Send Telegram alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ CI failed in repo: ${{ github.repository }} | workflow: ${{ github.workflow }} | branch: ${{ github.ref_name }} | commit: ${{ github.sha }}"    